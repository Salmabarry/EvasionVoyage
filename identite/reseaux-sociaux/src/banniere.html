<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 100vw; height: 100vh; overflow: hidden; position: relative;
         background: linear-gradient(115deg, #084F86 0%, #0A6EBD 55%, #1587DB 100%);
         display: flex; align-items: center; font-family: Inter, sans-serif; }
  /* trajectoire décorative */
  .orbite { position: absolute; right: -12vh; top: -30vh; width: 90vh; height: 90vh;
            border: 2.2vh solid rgba(245, 158, 11, .85); border-radius: 50%;
            border-left-color: transparent; border-bottom-color: transparent; transform: rotate(35deg); }
  .orbite2 { position: absolute; right: -20vh; bottom: -45vh; width: 100vh; height: 100vh;
             border: 1.4vh solid rgba(255, 255, 255, .25); border-radius: 50%;
             border-right-color: transparent; border-top-color: transparent; }
  .contenu { display: flex; align-items: center; gap: 4vh; padding-left: 6vh; z-index: 2; }
  .contenu img { height: 62vh; }
  .textes h1 { font-family: Poppins, sans-serif; font-size: 15vh; color: #fff; letter-spacing: -0.2vh; line-height: 1; }
  .textes h1 span { color: #F59E0B; }
  .textes p { margin-top: 2.6vh; color: rgba(255, 255, 255, .92); font-size: 4.6vh; letter-spacing: 1vh; font-weight: 600; }
</style></head>
<body>
  <div class="orbite"></div><div class="orbite2"></div>
  <div class="contenu">
    <img src="../../logo/svg/icone-blanc.svg">
    <div class="textes">
      <h1>Evasion<span>Voyage</span></h1>
      <p>LE MONDE EST À PORTÉE DE CLIC</p>
    </div>
  </div>
</body></html>
