<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  @page { size: A4; margin: 0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Inter, sans-serif; width: 210mm; height: 296mm; overflow: hidden; position: relative;
         background: linear-gradient(160deg, #084F86 0%, #0A6EBD 45%, #1587DB 80%); color: #fff;
         display: flex; flex-direction: column; align-items: center; text-align: center; }
  .orbite { position: absolute; width: 160mm; height: 160mm; border: 5mm solid rgba(245,158,11,.85); border-radius: 50%;
            border-left-color: transparent; border-bottom-color: transparent; right: -60mm; top: -55mm; transform: rotate(30deg); }
  .orbite2 { position: absolute; width: 180mm; height: 180mm; border: 3mm solid rgba(255,255,255,.18); border-radius: 50%;
             border-right-color: transparent; border-top-color: transparent; left: -70mm; bottom: -60mm; }
  img.icone { width: 72mm; margin-top: 26mm; }
  h1 { font-family: Poppins, sans-serif; font-weight: 800; font-size: 21mm; margin-top: 8mm; letter-spacing: -0.5mm; }
  h1 span { color: #F59E0B; }
  .devise { font-size: 6.4mm; letter-spacing: 2.4mm; font-weight: 600; margin-top: 4mm; color: rgba(255,255,255,.92); }
  .accroche { margin-top: 14mm; font-size: 7.6mm; line-height: 1.5; max-width: 150mm; font-weight: 500; }
  .bouton { margin-top: 12mm; background: #F59E0B; color: #fff; font-family: Poppins, sans-serif; font-weight: 700;
            font-size: 7mm; padding: 5.5mm 16mm; border-radius: 99mm; }
  .pied { position: absolute; bottom: 10mm; font-size: 4.4mm; color: rgba(255,255,255,.9); }
</style></head>
<body>
  <div class="orbite"></div><div class="orbite2"></div>
  <img class="icone" src="../../logo/svg/icone-blanc.svg">
  <h1>Evasion<span>Voyage</span></h1>
  <div class="devise">LE MONDE EST À PORTÉE DE CLIC</div>
  <div class="accroche">Réservez votre prochain voyage en ligne :<br>destinations de rêve, paiement sécurisé<br>Wave · Orange Money · Carte bancaire</div>
  <div class="bouton">evasionvoyage.com</div>
  <div class="pied">📍 Dakar, Sénégal — 📞 +221 77 145 49 28 (WhatsApp)</div>
</body></html>
