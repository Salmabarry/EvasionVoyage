<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  @page { size: A4; margin: 0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Inter, sans-serif; width: 210mm; height: 296mm; position: relative; }
  header { display: flex; justify-content: space-between; align-items: center; padding: 12mm 18mm 8mm; }
  header img { height: 22mm; }
  header .coord { text-align: right; font-size: 3.4mm; color: #64748b; line-height: 1.7; }
  .filet { height: 1.4mm; margin: 0 18mm; background: linear-gradient(90deg, #0A6EBD 70%, #F59E0B); border-radius: 2mm; }
  main { padding: 12mm 18mm; color: #374151; font-size: 4mm; line-height: 1.8; }
  main .exemple { color: #b6c2d2; }
  footer { position: absolute; bottom: 0; left: 0; right: 0; background: #084F86; color: rgba(255,255,255,.9);
           padding: 5mm 18mm; font-size: 3.2mm; display: flex; justify-content: space-between; align-items: center; }
  footer img { height: 9mm; }
</style></head>
<body>
  <header>
    <img src="../../logo/svg/logo-horizontal-couleur.svg">
    <div class="coord">
      Dakar, Sénégal<br>
      +221 77 145 49 28 · contact@evasionvoyage.com<br>
      evasionvoyage.com
    </div>
  </header>
  <div class="filet"></div>
  <main>
    <p class="exemple">Dakar, le … / … / 20…<br><br>Objet : …<br><br>Madame, Monsieur,<br><br>
    [ Corps de la lettre — papier à en-tête officiel EvasionVoyage ]<br><br><br>
    Signature</p>
  </main>
  <footer>
    <img src="../../logo/svg/icone-blanc.svg">
    <div>EvasionVoyage — Le monde est à portée de clic</div>
    <div>evasionvoyage.com</div>
  </footer>
</body></html>
